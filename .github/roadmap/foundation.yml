epic:
  title: "Foundation"
  milestone: "v0.1.0"
  description: >
    Establish the core FrameFlow architecture, development foundation,
    persistence layer, runtime structure, and operational baseline.

issues:
  - title: "Establish application architecture"
    type: "feature"
    labels:
      - "feature"
      - "area: infrastructure"
      - "priority: high"
      - "effort: l"
      - "status: ready"
    goal: >
      Define the initial Python application structure and module boundaries so
      FrameFlow can grow cleanly across ingestion, scheduling, storage, API, and UI layers.
    acceptance:
      - "Create the src/frameflow package structure."
      - "Define clear module boundaries for config, database, API, services, and domain models."
      - "Add placeholder modules with docstrings where helpful."
      - "Ensure imports and package discovery work through the existing tooling."
    out_of_scope:
      - "Implementing photo ingestion."
      - "Implementing DAKboard endpoints."
      - "Building a web UI."

  - title: "Implement configuration system"
    type: "feature"
    labels:
      - "feature"
      - "area: infrastructure"
      - "priority: high"
      - "effort: m"
      - "status: ready"
    goal: >
      Provide a typed configuration system for runtime settings, local paths,
      database location, logging level, and server behavior.
    acceptance:
      - "Support environment-variable based configuration."
      - "Support local development defaults."
      - "Validate required settings at startup."
      - "Document all initial configuration values."
    out_of_scope:
      - "Remote configuration management."
      - "User-facing settings UI."

  - title: "Create SQLite persistence layer"
    type: "feature"
    labels:
      - "feature"
      - "area: storage"
      - "priority: high"
      - "effort: l"
      - "status: ready"
    goal: >
      Establish the initial SQLite-backed persistence layer for storing library,
      photo, metadata, and rotation state.
    acceptance:
      - "Add database initialization logic."
      - "Create initial schema structure."
      - "Support schema migration or version tracking."
      - "Add tests for database initialization."
    out_of_scope:
      - "PostgreSQL support."
      - "Distributed storage."
      - "Production migration complexity beyond the initial local database."

  - title: "Define core domain models"
    type: "feature"
    labels:
      - "feature"
      - "area: core"
      - "priority: high"
      - "effort: m"
      - "status: ready"
    goal: >
      Define the core concepts FrameFlow will use across the application,
      including libraries, albums, photos, clients, and display events.
    acceptance:
      - "Define typed domain models for library, album, photo, client, and display event."
      - "Document model responsibilities and boundaries."
      - "Keep persistence-specific concerns separate from domain behavior."
      - "Add basic tests for model construction and validation."
    out_of_scope:
      - "Full metadata extraction."
      - "Rotation algorithm implementation."

  - title: "Add structured logging"
    type: "enhancement"
    labels:
      - "enhancement"
      - "area: infrastructure"
      - "priority: medium"
      - "effort: s"
      - "status: ready"
    goal: >
      Add consistent structured logging so sync, scheduling, API, and runtime
      behavior can be diagnosed from the beginning.
    acceptance:
      - "Configure application logging centrally."
      - "Include log level configuration."
      - "Use consistent log fields for major runtime events."
      - "Document local logging behavior."
    out_of_scope:
      - "External log aggregation."
      - "Metrics dashboards."

  - title: "Add health check endpoint"
    type: "feature"
    labels:
      - "feature"
      - "area: api"
      - "priority: medium"
      - "effort: s"
      - "status: ready"
    goal: >
      Provide a basic health endpoint that confirms the application is running
      and can be used by Docker, deployment scripts, and future monitoring.
    acceptance:
      - "Expose a health endpoint through the API."
      - "Return a stable machine-readable response."
      - "Include basic application version or status information."
      - "Add endpoint tests."
    out_of_scope:
      - "Deep dependency checks."
      - "Metrics endpoint."

  - title: "Create Docker runtime"
    type: "feature"
    labels:
      - "feature"
      - "area: infrastructure"
      - "priority: high"
      - "effort: m"
      - "status: ready"
    goal: >
      Provide a Docker image that can run FrameFlow consistently across local
      development, Raspberry Pi deployment, and future self-hosted installs.
    acceptance:
      - "Add a Dockerfile for the application."
      - "Use a production-appropriate Python runtime base."
      - "Keep image size reasonably small."
      - "Document build and run commands."
    out_of_scope:
      - "Multi-container production orchestration."
      - "Cloud deployment templates."

  - title: "Create Docker Compose development stack"
    type: "feature"
    labels:
      - "feature"
      - "area: infrastructure"
      - "priority: high"
      - "effort: m"
      - "status: ready"
    goal: >
      Provide a local Docker Compose stack for running FrameFlow with persistent
      storage, environment configuration, and predictable ports.
    acceptance:
      - "Add docker-compose.yml for local development."
      - "Mount local photo and data directories."
      - "Expose the application port."
      - "Document startup and shutdown commands."
    out_of_scope:
      - "Production backup automation."
      - "Reverse proxy configuration."

  - title: "Strengthen CI quality gates"
    type: "enhancement"
    labels:
      - "enhancement"
      - "area: testing"
      - "area: github"
      - "priority: high"
      - "effort: m"
      - "status: ready"
    goal: >
      Ensure GitHub Actions runs the same quality gates expected locally so
      every pull request is validated before merge.
    acceptance:
      - "Run tests in CI."
      - "Run linting and formatting checks in CI."
      - "Run type checking in CI."
      - "Confirm required checks can be selected in branch protection."
    out_of_scope:
      - "Release publishing."
      - "Code coverage gates."

  - title: "Document local development workflow"
    type: "documentation"
    labels:
      - "documentation"
      - "area: documentation"
      - "priority: medium"
      - "effort: s"
      - "status: ready"
    goal: >
      Document the standard local development workflow so contributors can set
      up, test, lint, and run FrameFlow consistently.
    acceptance:
      - "Document dependency installation."
      - "Document common just commands."
      - "Document pre-commit usage."
      - "Document how to run tests."
    out_of_scope:
      - "Full deployment documentation."
      - "User guide documentation."
