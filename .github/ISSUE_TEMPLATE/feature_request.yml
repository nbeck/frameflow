name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Providers
        - Rotation engine
        - API
        - Storage
        - Display clients
        - Documentation
        - Other
