name: Feature request
description: Propose a new capability or user-facing behavior.
title: "[Feature]: "
labels: ["feature", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new product capabilities. For smaller improvements, use the enhancement form.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
      placeholder: Describe the user need or workflow gap.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should FrameFlow do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, tools, or workarounds considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ingestion
        - metadata
        - scheduler
        - storage
        - clients
        - dakboard
        - api
        - ui
        - sync
        - infrastructure
        - documentation
        - testing
        - github
        - unknown
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be considered done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
