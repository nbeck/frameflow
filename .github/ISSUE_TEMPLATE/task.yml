name: Task
description: Track internal project work, chores, setup, research, or maintenance.
title: "[Task]: "
labels: ["status: triage"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this needed?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - github
        - infrastructure
        - documentation
        - testing
        - ingestion
        - metadata
        - scheduler
        - storage
        - clients
        - dakboard
        - api
        - ui
        - sync
        - unknown
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Break the task into concrete steps.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
