name: Bug report
description: Report something that is broken or behaving incorrectly.
title: "[Bug]: "
labels: ["bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for the issue to be reproduced.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the bug clearly and briefly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone reproduce the issue?
      placeholder: |
        1. Configure...
        2. Run...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: FrameFlow version
      placeholder: "v0.1.0, commit SHA, or main"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ingestion
        - metadata
        - scheduler
        - storage
        - clients
        - dakboard
        - api
        - ui
        - sync
        - infrastructure
        - documentation
        - testing
        - github
        - unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, deployment method, hardware, or client details.
      placeholder: Raspberry Pi, Docker Compose, DAKboard, browser, etc.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, screenshots, or error output.
      render: shell
    validations:
      required: false
