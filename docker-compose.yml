services:
  frameflow:
    container_name: frameflow-dev
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      FRAMEFLOW_ENV: development
    command:
      - uvicorn
      - frameflow.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./frameflow-data:/app/frameflow-data
    restart: unless-stopped
